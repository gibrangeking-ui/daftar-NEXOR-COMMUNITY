<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join NEXOR COMMUNITY 💣</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="logo">𝐍𝐄𝐗𝐎𝐑 𝐂𝐎𝐌𝐌𝐔𝐍𝐈𝐓𝐘 💣</h1>
            <p class="slogan">"Editing for Life"</p>
        </header>

        <section class="registration-form">
            <h3>Formulir Pendaftaran</h3>
            <div class="input-group">
                <input type="text" id="userName" placeholder="Nama Lengkap / Nickname" required>
                <input type="text" id="userOrigin" placeholder="Asal Kota" required>
                <input type="text" id="userApp" placeholder="Aplikasi Editing Andalan" required>
                <button onclick="generateCard()">Generate Kartu Intro</button>
            </div>
        </section>

        <section id="previewSection" class="hidden">
            <h3>Kartu Intro Kamu:</h3>
            <div id="introCard" class="card-design">
                <div class="card-header">NEXOR COMMUNITY</div>
                <div class="card-body">
                    <p><strong>NAMA:</strong> <span id="displayNm">...</span></p>
                    <p><strong>ASAL:</strong> <span id="displayOrg">...</span></p>
                    <p><strong>DEVICE/APP:</strong> <span id="displayApp">...</span></p>
                    <p class="card-status">STATUS: OFFICIAL MEMBER</p>
                </div>
                <div class="card-footer">Editing for Life</div>
            </div>
            <button class="btn-download" onclick="downloadCard()">Unduh & Kirim ke Grup</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
